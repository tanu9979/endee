version: "3.9"

services:
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    environment:
      NDD_NUM_THREADS: 0
      NDD_AUTH_TOKEN: ""
    volumes:
      - endee-data:/data
    restart: unless-stopped

  api:
    build: .
    container_name: justicemind-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      ENDEE_HOST: http://endee:8080
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - endee
    restart: unless-stopped

  ui:
    build: .
    container_name: justicemind-ui
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      API_BASE: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  endee-data:
